<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - SPPA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="navbar" class="navbar"></div>

<div class="page-wrapper">
<div class="container">

  <div class="dash-header">
    <h2>Dashboard</h2>
    <p class="dash-greeting">Resumen de tu actividad</p>
  </div>

  <div class="dashboard-charts">

  <!-- ================= SEMANAL ================= -->
  <h3 class="chart-section-title">Consumo semanal</h3>

  <div class="charts-row">

    <div class="chart-box">
      <h4>Ingredientes por semana</h4>
      <canvas id="chartSemanaBar"></canvas>
    </div>

    <div class="chart-box">
      <h4>Ingredientes frecuentes</h4>
      <canvas id="chartSemanaPie"></canvas>
    </div>

  </div>

  <!-- ================= MENSUAL ================= -->
  <h3 class="chart-section-title">Consumo mensual</h3>

  <div class="charts-row">

    <div class="chart-box">
      <h4>Ingredientes por mes</h4>
      <canvas id="chartMesBar"></canvas>
    </div>

    <div class="chart-box">
      <h4>Ingredientes frecuentes</h4>
      <canvas id="chartMesPie"></canvas>
    </div>

  </div>

</div>

</div>
</div>
<canvas id="chartSemana"></canvas>
<canvas id="chartMes"></canvas>
<canvas id="chartIngredientes"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
  import { renderNavbar } from './js/ui.js';
  renderNavbar('index.html');
</script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/pages/dashboard.js"></script>

</body>
</html>
