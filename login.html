<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - SPPA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-page">

<div id="navbar" class="navbar"></div>

<div class="auth-container">

  <div class="auth-logo">
    <div class="logo-big">🌿</div>
    <h2>Bienvenido</h2>
    <p>Ingresa a tu cuenta</p>
  </div>

  <form id="formLogin">

    <div class="form-group">
      <label class="form-label">Correo</label>
      <input type="email" name="email" class="form-control" required>
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <button class="btn btn-primary btn-full">Ingresar</button>

  </form>

  <div class="auth-footer">
    <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
  </div>

</div>

<script type="module">
  import { renderNavbar } from './js/ui.js';
  renderNavbar('index.html');
</script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/pages/login.js"></script>

</body>
</html>
